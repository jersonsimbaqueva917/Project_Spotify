<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spotify Stats</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 250px; }
        button { padding: 10px 20px; border-radius: 5px; background: #1DB954; color: white; border: none; cursor: pointer; }
        #resultados { margin-top: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: #181818; padding: 20px; border-radius: 10px; border: 1px solid #282828; width: 200px; }
    </style>
</head>
<body>
    <h1>🎵 Buscador Spotify Top 100</h1>
    <input type="text" id="termino" placeholder="Escribe el Rank o Artista...">
    <button onclick="buscar()">Buscar</button>

    <div id="resultados"></div>

    <script>
        async function buscar() {
            const termino = document.getElementById('termino').value;
            const res = await fetch(`/api/buscar?termino=${termino}`);
            const data = await res.json();
            
            const contenedor = document.getElementById('resultados');
            contenedor.innerHTML = data.map(item => `
                <div class="card">
                    <h3>#${item.alltime_rank}</h3>
                    <p><strong>${item.title}</strong></p>
                    <p>${item.artist}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
