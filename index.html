<!DOCTYPE html>
<html lang="es">
<head>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify All-Time Top 100 - Sugerencias</title>
    <style>
        :root { --spotify-green: #1DB954; --dark-bg: #121212; --card-bg: #181818; --text-muted: #b3b3b3; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Circular', 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .header { padding: 30px 0; }
        h1 { font-size: 2rem; margin-bottom: 15px; }
        
        .search-box { margin-bottom: 30px; position: relative; display: inline-block; }
        input { padding: 12px 20px; border-radius: 20px; border: 2px solid transparent; width: 350px; font-size: 1rem; outline: none; transition: 0.3s; background-color: #282828; color: white; }
        input:focus { border-color: var(--spotify-green); background-color: #333; }

        h2 { text-align: left; margin-left: 5%; color: var(--spotify-green); border-bottom: 1px solid #282828; padding-bottom: 8px; font-size: 1.3rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; padding: 0 5%; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 6px; text-align: left; transition: 0.3s; position: relative; border: 1px solid transparent; }
        .card:hover { background: #282828; border-color: #3e3e3e; }
        
        .rank { position: absolute; top: 10px; right: 10px; color: var(--spotify-green); font-weight: bold; font-size: 1.1rem; opacity: 0.7; }
        .title { font-size: 1.1rem; font-weight: bold; margin: 0 0 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 85%; }
        .artist { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; }
        
        .meta-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; border-top: 1px solid #282828; padding-top: 8px; margin-top: 5px; }
        .genre { font-style: italic; text-transform: capitalize; }
        .streams { color: var(--spotify-green); font-weight: bold; }
        
        /* Pequeño spinner de carga */
        .loader { display: none; position: absolute; right: 15px; top: 12px; border: 3px solid #f3f3f3; border-top: 3px solid var(--spotify-green); border-radius: 50%; width: 15px; height: 15px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎵 Spotify Top 100</h1>
        <div class="search-box">
            <input type="text" id="busqueda" placeholder="Empieza a escribir un artista (ej: The Weeknd)..." onkeyup="buscarMientrasEscribo()">
            <div class="loader" id="loader"></div>
        </div>
    </div>

    <h2 id="titulo-seccion">Sugerencias / Top 10</h2>
    <div id="contenedor" class="grid">
        </div>

    <script>
        // Función para renderizar las tarjetas actualizadas con Genre y Streams
		function renderizar(datos) {
            const contenedor = document.getElementById('contenedor');
            if (!datos || datos.length === 0) {
                contenedor.innerHTML = "<p>No se encontraron resultados.</p>";
                return;
            }
            contenedor.innerHTML = datos.map(cancion => `
                <div class="card">
                    <span class="rank">#${cancion.alltime_rank}</span>
                    <div class="title" title="${cancion.title}">${cancion.title}</div>
                    <div class="artist">${cancion.artist}</div>
                    
                    <div class="extra-info">
                        <span class="tag">📅 ${cancion.year || 'N/A'}</span>
                        <span class="tag">📍 ${cancion.country || 'Global'}</span>
                    </div>

                    <div class="meta-info">
                        <span class="genre">${cancion.genre || 'N/A'}</span>
                        <span class="streams">🎧 ${cancion.streams_billions || '0'}B</span>
                    </div>
                </div>
            `).join('');
        }

        let timeoutBusqueda = null;

        // Función que busca cada vez que presionas una tecla (con delay)
        function buscarMientrasEscribo() {
            const termino = document.getElementById('busqueda').value;
            const loader = document.getElementById('loader');

            // Limpiamos el temporizador anterior para no saturar la API
            clearTimeout(timeoutBusqueda);

            if (!termino) {
                loader.style.display = "none";
                cargarTop10(); // Si borra todo, vuelve al Top 10
                return;
            }

            loader.style.display = "block"; // Mostramos spinner

            // Esperamos 300ms después de que dejó de escribir para buscar
            timeoutBusqueda = setTimeout(async () => {
                document.getElementById('titulo-seccion').innerText = `Sugerencias para: "${termino}"`;
                try {
                    const res = await fetch(`/api/buscar?termino=${termino}`);
                    const datos = await res.json();
                    renderizar(datos);
                } catch (e) {
                    console.error(e);
                } finally {
                    loader.style.display = "none"; // Ocultamos spinner
                }
            }, 300);
        }

        
		
		let miGrafica;

        async function inicializarApp() {
            try {
                // 1. Una sola petición para obtener todo el Top 100
                const res = await fetch('/api/stats');
                const todasLasCanciones = await res.json();

                // 2. Renderizar el Top 10 inicial
                renderizar(todasLasCanciones.slice(0, 10));

                // 3. Procesar datos para la gráfica
                const conteoAnios = {};
                todasLasCanciones.forEach(c => {
                    const anio = c.year || "N/A";
                    conteoAnios[anio] = (conteoAnios[anio] || 0) + 1;
                });

                const aniosOrdenados = Object.keys(conteoAnios).sort();
                const valores = aniosOrdenados.map(a => conteoAnios[a]);

                // 4. Dibujar la gráfica
                const ctx = document.getElementById('graficaAnios').getContext('2d');
                if (miGrafica) miGrafica.destroy();

                miGrafica = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: aniosOrdenados,
                        datasets: [{
                            label: 'Canciones en el Top 100',
                            data: valores,
                            backgroundColor: '#1DB954',
                            borderRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: 'white' } } },
                        scales: {
                            y: { ticks: { color: '#b3b3b3' }, grid: { color: '#282828' } },
                            x: { ticks: { color: '#b3b3b3' }, grid: { display: false } }
                        }
                    }
                });
            } catch (error) {
                console.error("Error al cargar estadísticas:", error);
            }
        }

        
        window.onload = inicializarApp;
       
		
    </script>
	<div style="width: 80%; margin: 50px auto; background: #181818; padding: 20px; border-radius: 10px;">
    <h2 style="text-align: center; color: #1DB954;">Distribución por Año de Lanzamiento</h2>
    <canvas id="graficaAnios"></canvas>
</div>
</body>
</html>
